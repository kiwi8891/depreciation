<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activos · Depreciación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <div class="header-brand">
                <div class="brand-icon">◈</div>
                <div>
                    <div class="brand-name">Activos</div>
                    <div class="brand-sub">Control de depreciación</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" id="btn-import" title="Importar JSON desde Filen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Importar
                </button>
                <button class="btn btn-outline" id="btn-export" title="Exportar JSON a Filen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Exportar
                </button>
                <button class="btn btn-primary" id="btn-new-asset">
                    + Nuevo activo
                </button>
            </div>
        </div>
    </header>

    <main id="app" class="app-main"></main>

    <!-- Hidden file input for import -->
    <input type="file" id="file-input" accept=".json" style="display:none">

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
